<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="src/style.css" />
        <link rel="stylesheet" href="src/index.css" />
        <script
            src="https://kit.fontawesome.com/6bdd901107.js"
            crossorigin="anonymous"
        ></script>
        <title>Twitter | Login</title>
    </head>
    <body>
        <header class="header">
            <span class="header--icon"
                ><i class="fa-brands fa-twitter"></i
            ></span>
            <div class="header--titles">
                <p class="titles--title">Lo que está pasando ahora</p>
                <p class="titles--title">Únete a Twitter hoy mismo.</p>
            </div>
        </header>
        <main class="main">
            <div class="main--buttons">
                <button
                    class="main--button main--button__white button--margin__16"
                >
                    <span class="button--icon"
                        ><i class="fa-brands fa-google"></i
                    ></span>
                    Registrate con Google
                </button>
                <button
                    class="main--button main--button__white button--margin__8"
                >
                    <span class="button--icon"
                        ><i class="fa-brands fa-apple"></i
                    ></span>
                    Registrate con Apple
                </button>
                <span class="main--divisor">o</span>
                <button
                    class="main--button main--button__blue button--text__elipsis button--margin__8"
                >
                    Regístrate con el número de teléfono o correo electrónico
                </button>
                <div class="main--disclaimer">
                    Al registrarte, aceptas los <a href="#">Términos de servicio</a> y la
                    <a href="#">Política de privacidad</a>, incluida la política de <a href="#">Uso de
                    Cookies</a>.
                </div>
                <div class="main--login">
                    <h3>¿Ya tienes cuenta?</h3>
                    <button
                        class="main--button main--button__white button--text__blue"
                    >
                        Iniciar sesion
                    </button>
                </div>
            </div>

            <div><img src="https://abs.twimg.com/sticky/illustrations/lohp_1302x955.png" alt=""></div>
        </main>

        <footer>
            <ul>
                <li>acerca de</li>
            </ul>
        </footer>
    </body>
</html>
